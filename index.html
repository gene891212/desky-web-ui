<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartDesk - 智慧升降桌儀表板</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartDesk">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & Lucide Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css?v=20260709-thin-line">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              900: '#312e81'
            },
            slate: {
              850: '#172033'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen p-4 select-none flex flex-col justify-between">



  <!-- 橫向模式提示 (僅在直向時顯示) -->
  <div class="portrait-warning fixed inset-0 bg-slate-950 z-50 flex-col items-center justify-center p-6 text-center hidden">
    <div class="w-16 h-16 bg-slate-900 text-brand-500 rounded-full flex items-center justify-center mb-4 border border-slate-800">
      <i data-lucide="rotate-cw" class="w-8 h-8"></i>
    </div>
    <h3 class="text-xl font-bold mb-2">請橫置手機</h3>
    <p class="text-slate-400 text-sm font-medium">此控制面板專為手機橫向觸控操作設計</p>
  </div>

  <!-- ==================== VIEW 1: CONTROL (主控制視圖) ==================== -->
  <div id="control-view" class="w-full h-full flex flex-col justify-between">
    <!-- 主控台網格佈局 (上排 2 欄 + 底部全寬控制列) -->
    <main class="grid grid-cols-2 grid-rows-[1fr_auto] gap-4 flex-1 w-full h-full overflow-hidden">

        <!-- 高度狀態卡片 -->
        <div class="height-card bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between relative overflow-hidden">
          <div class="flex justify-between items-start mb-3">
            <div class="flex items-center gap-2">
              <i data-lucide="ruler" class="w-5 h-5 text-brand-500"></i>
              <span class="text-sm font-bold tracking-wide text-slate-400">當前高度</span>
            </div>

            <!-- 坐/站 狀態徽章 -->
            <div id="status-badge" class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-bold bg-indigo-950 text-indigo-400 border border-indigo-900">
              <i data-lucide="accessibility" class="w-3.5 h-3.5"></i>
              <span id="status-text">坐姿模式</span>
            </div>
          </div>

          <!-- 數字顯示 -->
          <div class="height-readout flex items-baseline">
            <span id="height-display" class="height-value digital-font font-bold text-brand-500">--.-</span>
            <span id="unit-display" class="height-unit text-slate-400 font-bold">cm</span>
          </div>

          <div class="height-record" aria-hidden="true">
            <div class="height-record-grid"></div>
            <svg class="height-record-chart" viewBox="0 0 100 100" preserveAspectRatio="none">
              <defs>
                <linearGradient id="height-line-gradient" x1="0" y1="0" x2="1" y2="0">
                  <stop offset="0%" stop-color="#7c7cff" />
                  <stop offset="100%" stop-color="#5756e6" />
                </linearGradient>
                <linearGradient id="height-area-gradient" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25" />
                  <stop offset="100%" stop-color="#6366f1" stop-opacity="0.0" />
                </linearGradient>
              </defs>
              <path id="height-history-area" class="height-history-area" d="M 0,50 L 100,50 L 100,100 L 0,100 Z" />
              <path id="height-history-line" class="height-history-line" d="M 0,50 L 100,50" />
              <circle id="height-history-dot" class="height-history-dot" cx="100" cy="50" r="1.8" />
            </svg>

          </div>
        </div>

        <!-- 坐站排程卡片 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-start relative">
          <div>
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <i data-lucide="clipboard-clock" class="w-5 h-5 text-brand-500"></i>
                <span class="text-sm font-bold tracking-wide text-slate-400">坐站排程</span>
              </div>

              <div class="flex items-center gap-2">
                <!-- Switch 觸控開關 -->
                <label class="inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="schedule-toggle" class="sr-only peer">
                  <div class="relative w-11 h-6 bg-slate-850 border border-slate-700 rounded-full transition-colors peer-checked:bg-brand-500 peer-checked:border-brand-500 after:content-[''] after:absolute after:top-[1px] after:left-[1px] after:h-5 after:w-5 after:bg-slate-400 after:rounded-full after:transition-all peer-checked:after:translate-x-full peer-checked:after:bg-white"></div>
                </label>
              </div>
            </div>

            <!-- 觸控滑軌 (Sliders) -->
            <div class="space-y-2">
              <!-- Sitting Time Slider -->
              <div class="space-y-0.5">
                <div class="flex items-center justify-between w-full mb-1">
                  <span class="text-sm font-bold text-slate-500">坐姿時間：</span>
                  <div class="flex items-baseline gap-1">
                    <span id="sit-time-display" class="digital-font text-3xl font-bold text-brand-500">--</span>
                    <span class="text-xs text-slate-400 font-bold ml-0.5">分</span>
                  </div>
                </div>
                <div class="py-0.5">
                  <input
                    type="range"
                    id="sit-time-slider"
                    min="1"
                    max="60"
                    value="1"
                    class="w-full appearance-none cursor-pointer accent-brand-500 bg-transparent"
                  >
                </div>
              </div>

              <!-- Standing Time Slider -->
              <div class="space-y-0.5">
                <div class="flex items-center justify-between w-full mb-1">
                  <span class="text-sm font-bold text-slate-500">站姿時間：</span>
                  <div class="flex items-baseline gap-1">
                    <span id="stand-time-display" class="digital-font text-3xl font-bold text-emerald-500">--</span>
                    <span class="text-xs text-slate-400 font-bold ml-0.5">分</span>
                  </div>
                </div>
                <div class="py-0.5">
                  <input
                    type="range"
                    id="stand-time-slider"
                    min="1"
                    max="60"
                    value="1"
                    class="w-full appearance-none cursor-pointer accent-emerald-500 bg-transparent"
                  >
                </div>
              </div>
            </div>
          </div>

        </div>

        <!-- 底部全寬控制列: 手動移動 + 記憶預設 -->
        <div class="col-span-2 bg-slate-900 border border-slate-800 rounded-2xl p-4 h-32 flex flex-col justify-between">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="database" class="w-5 h-5 text-brand-500"></i>
            <span class="text-sm font-bold tracking-wide text-slate-400">高度控制與記憶</span>
          </div>
          <div class="flex gap-4 flex-1 min-h-0">
            <!-- 手動快速調整 (上升/下降) -->
            <button
              id="btn-raise"
              class="flex-1 flex items-center justify-center gap-2 h-full rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-base select-none touch-none hover:bg-slate-800 hover:border-slate-700 active:bg-emerald-950/60 active:border-emerald-800 active:text-emerald-100 active:scale-95 transition-all duration-100"
              oncontextmenu="return false;"
            >
              <i data-lucide="chevron-up" class="w-6 h-6"></i>
              <span>上升</span>
            </button>
            <button
              id="btn-lower"
              class="flex-1 flex items-center justify-center gap-2 h-full rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-base select-none touch-none hover:bg-slate-800 hover:border-slate-700 active:bg-rose-950/60 active:border-rose-800 active:text-rose-100 active:scale-95 transition-all duration-100"
              oncontextmenu="return false;"
            >
              <i data-lucide="chevron-down" class="w-6 h-6"></i>
              <span>下降</span>
            </button>

            <!-- 分隔線 1 -->
            <div class="w-px bg-slate-800"></div>

            <!-- 記憶預設 (Memory Presets) 與設定 -->
            <button data-button="M1" class="preset-recall flex-1 flex items-center justify-center h-full rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-sm text-slate-200 font-bold">M1</span>
            </button>
            <button data-button="M2" class="preset-recall flex-1 flex items-center justify-center h-full rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-sm text-slate-200 font-bold">M2</span>
            </button>
            <button data-button="M3" class="preset-recall flex-1 flex items-center justify-center h-full rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-sm text-slate-200 font-bold">M3</span>
            </button>

            <!-- 分隔線 2 -->
            <div class="w-px bg-slate-800"></div>

            <button onclick="switchView('settings')" class="flex-1 flex items-center justify-center h-full rounded-xl bg-slate-850 border border-slate-800 hover:bg-slate-800 text-slate-300 hover:text-white active:scale-95 transition-all duration-100" title="前往設定">
              <i data-lucide="settings" class="w-5 h-5"></i>
            </button>
          </div>
        </div>

    </main>
  </div>


  <!-- ==================== VIEW 2: SETTINGS (設定視圖) ==================== -->
  <div id="settings-view" class="hidden w-full h-full flex flex-col justify-between">
    <!-- 設定頁面頂部導覽列 -->
    <div class="flex items-center justify-between mb-4">
      <button onclick="switchView('control')" class="flex items-center gap-2 text-slate-400 hover:text-white transition-colors" title="返回主控">
        <i data-lucide="arrow-left" class="w-5 h-5"></i>
        <span class="text-sm font-bold tracking-wide">返回</span>
      </button>

      <div class="flex items-center gap-2">
        <button id="settings-dot-connect-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800" title="連線狀態 (點擊重新連線)">
          <span id="settings-status-dot" class="block w-2.5 h-2.5 rounded-full bg-rose-500"></span>
          <span id="settings-status-text" class="text-xs font-bold text-rose-500">未連線</span>
        </button>
      </div>
    </div>

    <main class="flex-1 w-full h-full overflow-y-auto space-y-4 pb-3">

      <div class="grid grid-cols-2 gap-4">

        <!-- Height Threshold 卡片 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between relative">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="git-commit-horizontal" class="w-5 h-5 text-brand-500"></i>
            <span class="text-sm font-bold tracking-wide text-slate-400">高度臨界值設定</span>
          </div>

          <!-- 目前高度 -->
          <div class="flex items-center justify-between w-full mb-3">
            <span class="text-sm text-slate-500">目前高度：</span>
            <div class="flex items-baseline gap-1">
              <span id="settings-height-display" class="digital-font text-2xl font-bold text-brand-400">--.-</span>
              <span class="text-xs text-slate-500 font-bold ml-0.5">cm</span>
            </div>
          </div>

          <!-- 目前偵測 -->
          <div class="flex items-center justify-between w-full mb-3">
            <span class="text-sm text-slate-500">目前偵測模式：</span>
            <span id="settings-status-badge" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-bold bg-indigo-950 text-indigo-400 border border-indigo-900">坐姿</span>
          </div>

          <!-- 分隔線 -->
          <div class="h-px bg-slate-800 my-2"></div>

          <!-- Threshold 滑桿控制 -->
          <div class="mt-auto">
            <div class="flex items-center justify-between w-full">
              <span class="text-sm text-slate-500">判定坐姿或站姿的基準高度：</span>
              <div class="flex items-baseline gap-1">
                <span id="threshold-val-display" class="digital-font text-3xl font-bold text-brand-500">--.-</span>
                <span class="text-xs text-slate-400 font-bold ml-0.5">cm</span>
              </div>
            </div>
            <div class="py-2">
              <input
                type="range"
                id="threshold-slider"
                min="60.0"
                max="130.0"
                step="0.5"
                value="90.0"
                class="w-full appearance-none cursor-pointer accent-brand-500 bg-transparent"
              >
            </div>
          </div>
        </div>

        <!-- Connection 模組 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-5 flex flex-col justify-between">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="wifi" class="w-5 h-5 text-brand-500"></i>
            <span class="text-sm font-bold tracking-wide text-slate-400">連線配置</span>
          </div>

          <div class="space-y-3 flex-1 flex flex-col justify-center">
            <!-- Desk Address -->
            <div>
              <label class="block text-xs font-bold text-slate-500 mb-1">Desk address（ESPHome 裝置 IP）</label>
              <input
                type="text"
                id="input-desk-address"
                class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2.5 text-sm text-slate-200 focus:border-brand-500 outline-none font-bold"
                placeholder="192.168.1.120"
              >
            </div>

            <!-- Username & Password Row -->
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">Username（選填）</label>
                <input
                  type="text"
                  id="input-username"
                  class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2.5 text-sm text-slate-200 focus:border-brand-500 outline-none font-bold"
                  placeholder="使用者帳戶"
                >
              </div>
              <div>
                <label class="block text-xs font-bold text-slate-500 mb-1">Password（選填）</label>
                <input
                  type="password"
                  id="input-password"
                  class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2.5 text-sm text-slate-200 focus:border-brand-500 outline-none font-bold"
                  placeholder="使用者密碼"
                >
              </div>
            </div>
          </div>

          <!-- Save & Reconnect -->
          <button id="btn-save-settings" class="w-full mt-3 py-3 bg-brand-600 hover:bg-brand-500 text-white font-bold text-sm rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            Save & Reconnect
          </button>
        </div>

      </div>

      <div class="grid grid-cols-2 gap-4">

        <!-- Save Current Height to Memory -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="save" class="w-5 h-5 text-brand-500"></i>
            <span class="text-sm font-bold tracking-wide text-slate-400">儲存當前高度至記憶體</span>
          </div>
          <span class="text-sm text-slate-500 mb-3">將目前實際高度複寫覆蓋進對應預設鍵中</span>
          <div class="grid grid-cols-3 gap-3">
            <button data-button="Save Height in Memory 1" class="ghost-save-btn py-3.5 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M1
            </button>
            <button data-button="Save Height in Memory 2" class="ghost-save-btn py-3.5 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M2
            </button>
            <button data-button="Save Height in Memory 3" class="ghost-save-btn py-3.5 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M3
            </button>
          </div>
        </div>

        <!-- Misc 模組 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
          <div class="flex items-center gap-2 mb-3">
            <i data-lucide="cpu" class="w-5 h-5 text-brand-500"></i>
            <span class="text-sm font-bold tracking-wide text-slate-400">硬體通訊測試</span>
          </div>
          <button id="btn-request" class="w-full py-3 bg-slate-850 border border-slate-800 text-slate-300 hover:text-white hover:bg-slate-800 text-sm font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i data-lucide="power" class="w-4 h-4 text-brand-400"></i>
            Request Height (喚醒桌子並同步高度)
          </button>
        </div>

      </div>

    </main>
  </div>

  <!-- 自定義訊息提示 Toast 容器 -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="app.js?v=20260709-thin-line"></script>
</body>
</html>
