<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartDesk - 智慧升降桌儀表板</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartDesk">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & Lucide Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css?v=20260711-blue">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef7ff',
              100: '#dbecff',
              300: '#8ec4ff',
              400: '#5da9ff',
              500: '#2f8bff',
              600: '#1c6fe0',
              700: '#1558b3',
              900: '#0b2a52',
              950: '#071c38'
            },
            slate: {
              850: '#151b2c'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-[#030508] text-slate-100 h-screen h-[100dvh] w-screen overflow-hidden p-4 select-none flex flex-col">

  <!-- Ambient background glow orbs -->
  <div class="fixed inset-0 overflow-hidden pointer-events-none z-0" aria-hidden="true">
    <!-- Blueprint grid pattern overlay -->
    <div class="absolute inset-0 bg-grid-overlay opacity-[0.4]"></div>

    <!-- Glowing color orbs -->
    <div class="absolute -top-40 -left-40 w-[500px] h-[500px] rounded-full bg-brand-500/10 blur-[130px] animate-breathe-orb-1"></div>
    <div class="absolute top-1/3 -right-40 w-[400px] h-[400px] rounded-full bg-emerald-500/05 blur-[120px] animate-breathe-orb-2"></div>
    <div class="absolute -bottom-40 left-1/3 w-[550px] h-[550px] rounded-full bg-purple-500/05 blur-[145px] animate-breathe-orb-3"></div>

    <!-- HUD technical schematic lines -->
    <svg class="absolute inset-0 w-full h-full opacity-[0.035]" xmlns="http://www.w3.org/2000/svg">
      <!-- Technical circles and grids -->
      <circle cx="20%" cy="30%" r="180" fill="none" stroke="white" stroke-width="1" stroke-dasharray="4 8" />
      <circle cx="20%" cy="30%" r="186" fill="none" stroke="white" stroke-width="0.5" opacity="0.5" />
      <circle cx="20%" cy="30%" r="320" fill="none" stroke="#2f8bff" stroke-width="1" opacity="0.3" />
      <circle cx="80%" cy="70%" r="240" fill="none" stroke="white" stroke-width="1" stroke-dasharray="20 8 4 8" />
      <circle cx="80%" cy="70%" r="248" fill="none" stroke="white" stroke-width="0.5" opacity="0.5" />
      
      <!-- Tech lines and crosshairs -->
      <line x1="0" y1="15%" x2="100%" y2="15%" stroke="white" stroke-width="0.5" stroke-dasharray="100 10 20 10" />
      <line x1="0" y1="85%" x2="100%" y2="85%" stroke="white" stroke-width="0.5" stroke-dasharray="20 10 100 10" />
      <line x1="20%" y1="0" x2="20%" y2="100%" stroke="white" stroke-width="0.5" stroke-dasharray="10 10" />
      <line x1="80%" y1="0" x2="80%" y2="100%" stroke="white" stroke-width="0.5" stroke-dasharray="10 10" />
      
      <!-- Tiny corner grids/marks -->
      <path d="M 30,30 L 50,30 M 30,30 L 30,50" stroke="white" stroke-width="1.5" fill="none" />
      <path d="M 30,calc(100% - 30) L 50,calc(100% - 30) M 30,calc(100% - 30) L 30,calc(100% - 50)" stroke="white" stroke-width="1.5" fill="none" />
      <path d="M calc(100% - 30),30 L calc(100% - 50),30 M calc(100% - 30),30 L calc(100% - 30),50" stroke="white" stroke-width="1.5" fill="none" />
      <path d="M calc(100% - 30),calc(100% - 30) L calc(100% - 50),calc(100% - 30) M calc(100% - 30),calc(100% - 30) L calc(100% - 30),calc(100% - 50)" stroke="white" stroke-width="1.5" fill="none" />
    </svg>
  </div>




  <!-- 連線狀態指示燈 (常駐於畫面角落，切到設定頁時由 switchView() 隱藏，呼吸動畫) -->
  <span id="status-dot" class="fixed top-3 right-3 z-40 block w-2 h-2 rounded-full bg-rose-500 pointer-events-none" aria-hidden="true"></span>

  <!-- ==================== VIEW 1: CONTROL (主控制視圖) ==================== -->
  <div id="control-view" class="view-enter w-full flex-1 min-h-0 flex flex-col">
    <!-- 主控台網格佈局 (上排 2 欄 + 底部全寬控制列) -->
    <main class="grid grid-cols-[3fr_2fr] grid-rows-[1fr_auto] gap-4 flex-1 min-h-0 w-full">

        <!-- 高度狀態卡片 -->
        <div class="height-card panel-card relative">
          <div class="inner-core p-4 flex flex-col justify-between relative overflow-hidden h-full">
            <div class="flex justify-between items-start mb-3">
              <div class="flex items-center gap-2">
                <i data-lucide="ruler" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
                <span class="text-sm font-semibold tracking-wide text-slate-400">當前高度</span>
              </div>

              <!-- 坐/站 狀態徽章 -->
              <div id="status-badge" class="inline-flex items-center gap-1 px-3 py-1 rounded-full text-xs font-semibold bg-brand-950 text-brand-400 border border-brand-900/60">
                <span id="status-icon-slot" class="inline-flex w-3.5 h-3.5 items-center justify-center">
                  <i data-lucide="accessibility" class="w-3.5 h-3.5" stroke-width="1.75"></i>
                </span>
                <span id="status-text">坐姿模式</span>
              </div>
            </div>

            <!-- 數字顯示 -->
            <div class="height-readout flex items-baseline">
              <span id="height-display" class="height-value digital-font font-semibold text-brand-500 tabular-nums">--.-</span>
              <span id="unit-display" class="height-unit text-slate-400 font-semibold">cm</span>
            </div>

            <div class="height-record" aria-hidden="true">
              <div class="height-record-grid"></div>
              <svg class="height-record-chart" viewBox="0 0 100 100" preserveAspectRatio="none">
                <defs>
                  <linearGradient id="height-line-gradient" x1="0" y1="0" x2="1" y2="0">
                    <stop offset="0%" stop-color="#5da9ff" />
                    <stop offset="100%" stop-color="#1c6fe0" />
                  </linearGradient>
                  <linearGradient id="height-area-gradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#2f8bff" stop-opacity="0.22" />
                    <stop offset="100%" stop-color="#2f8bff" stop-opacity="0.0" />
                  </linearGradient>
                </defs>
                <path id="height-history-area" class="height-history-area" d="M 0,50 L 100,50 L 100,100 L 0,100 Z" />
                <path id="height-history-line" class="height-history-line" d="M 0,50 L 100,50" />
                <circle id="height-history-dot" class="height-history-dot" cx="100" cy="50" r="1.8" />
              </svg>
            </div>
          </div>
        </div>

        <!-- 坐站排程卡片 -->
        <div class="panel-card relative">
          <div class="inner-core p-4 flex flex-col justify-start relative h-full">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <i data-lucide="clipboard-clock" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
                <span class="text-sm font-semibold tracking-wide text-slate-400">坐站排程</span>
              </div>

              <div class="flex items-center gap-2">
                <!-- Switch 觸控開關 -->
                <label class="inline-flex items-center cursor-pointer">
                  <input type="checkbox" id="schedule-toggle" class="sr-only peer">
                  <div class="relative w-11 h-6 bg-slate-850 border border-slate-700 rounded-full transition-colors duration-200 peer-checked:bg-brand-500 peer-checked:border-brand-500 after:content-[''] after:absolute after:top-[1px] after:left-[1px] after:h-5 after:w-5 after:bg-slate-400 after:rounded-full after:transition-all after:duration-200 after:shadow-sm peer-checked:after:translate-x-full peer-checked:after:bg-white"></div>
                </label>
              </div>
            </div>

            <!-- 觸控滑軌 (Sliders) -->
            <div class="space-y-2">
              <!-- Sitting Time Slider -->
              <div class="space-y-0.5">
                <div class="flex items-center justify-between w-full mb-1">
                  <span class="text-sm font-semibold text-slate-500">坐姿時間：</span>
                  <div class="flex items-baseline gap-1">
                    <span id="sit-time-display" class="digital-font text-3xl font-semibold text-brand-500 tabular-nums">--</span>
                    <span class="text-xs text-slate-400 font-semibold ml-0.5">分</span>
                  </div>
                </div>
                <div class="py-0.5">
                  <input
                    type="range"
                    id="sit-time-slider"
                    min="1"
                    max="60"
                    value="1"
                    class="range-fill range-brand w-full appearance-none cursor-pointer bg-transparent"
                  >
                </div>
              </div>

              <!-- Standing Time Slider -->
              <div class="space-y-0.5">
                <div class="flex items-center justify-between w-full mb-1">
                  <span class="text-sm font-semibold text-slate-500">站姿時間：</span>
                  <div class="flex items-baseline gap-1">
                    <span id="stand-time-display" class="digital-font text-3xl font-semibold text-emerald-500 tabular-nums">--</span>
                    <span class="text-xs text-slate-400 font-semibold ml-0.5">分</span>
                  </div>
                </div>
                <div class="py-0.5">
                  <input
                    type="range"
                    id="stand-time-slider"
                    min="1"
                    max="60"
                    value="1"
                    class="range-fill range-emerald w-full appearance-none cursor-pointer bg-transparent"
                  >
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- 底部全寬控制列: 手動移動 + 記憶預設 -->
        <div class="col-span-2 panel-card h-32 relative">
          <div class="inner-core p-4 flex flex-col justify-between relative h-full">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="database" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
              <span class="text-sm font-semibold tracking-wide text-slate-400">高度控制與記憶</span>
            </div>
            <div class="flex gap-4 flex-1 min-h-0">
              <!-- 手動快速調整 (上升/下降) -->
              <button
                id="btn-raise"
                class="flex-1 flex items-center justify-center gap-2 h-full text-slate-200 font-semibold text-base select-none touch-none"
                oncontextmenu="return false;"
              >
                <i data-lucide="chevron-up" class="w-6 h-6" stroke-width="1.75"></i>
                <span>上升</span>
              </button>
              <button
                id="btn-lower"
                class="flex-1 flex items-center justify-center gap-2 h-full text-slate-200 font-semibold text-base select-none touch-none"
                oncontextmenu="return false;"
              >
                <i data-lucide="chevron-down" class="w-6 h-6" stroke-width="1.75"></i>
                <span>下降</span>
              </button>

              <!-- 分隔線 1 -->
              <div class="w-px bg-white/10"></div>

              <!-- 記憶預設 (Memory Presets) 與設定 -->
              <button data-button="M1" class="preset-recall flex-1 flex items-center justify-center h-full">
                <span class="text-sm text-slate-200 font-semibold">M1</span>
              </button>
              <button data-button="M2" class="preset-recall flex-1 flex items-center justify-center h-full">
                <span class="text-sm text-slate-200 font-semibold">M2</span>
              </button>
              <button data-button="M3" class="preset-recall flex-1 flex items-center justify-center h-full">
                <span class="text-sm text-slate-200 font-semibold">M3</span>
              </button>

              <!-- 分隔線 2 -->
              <div class="w-px bg-white/10"></div>

              <button onclick="switchView('settings')" class="flex-1 flex items-center justify-center h-full text-slate-300 hover:text-white" title="前往設定">
                <i data-lucide="settings" class="w-5 h-5" stroke-width="1.75"></i>
              </button>
            </div>
          </div>
        </div>

    </main>
  </div>


  <!-- ==================== VIEW 2: SETTINGS (設定視圖) ==================== -->
  <div id="settings-view" class="view-enter hidden w-full flex-1 min-h-0 flex flex-col">
    <!-- 設定頁面頂部導覽列 -->
    <div class="flex items-center justify-between mb-4">
      <button onclick="switchView('control')" class="flex items-center gap-2 text-slate-400 hover:text-white active:scale-[0.97] transition-all" title="返回主控">
        <i data-lucide="arrow-left" class="w-5 h-5" stroke-width="1.75"></i>
        <span class="text-sm font-semibold tracking-wide">返回</span>
      </button>

      <div class="flex items-center gap-2">
        <button id="settings-dot-connect-btn" class="flex items-center gap-2 px-3 py-1.5 rounded-full bg-slate-900 border border-slate-800 active:scale-[0.97] transition-all" title="連線狀態 (點擊重新連線)">
          <span id="settings-status-dot" class="block w-2.5 h-2.5 rounded-full bg-rose-500"></span>
          <span id="settings-status-text" class="text-xs font-semibold text-rose-500">未連線</span>
        </button>
      </div>
    </div>

    <main class="flex-1 min-h-0 w-full overflow-y-auto space-y-4 pb-3">

      <div class="grid grid-cols-[2fr_3fr] gap-4">

        <!-- Height Threshold 卡片 -->
        <div class="panel-card relative">
          <div class="inner-core p-4 flex flex-col justify-between relative h-full">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="git-commit-horizontal" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
              <span class="text-sm font-semibold tracking-wide text-slate-400">高度臨界值設定</span>
            </div>

            <!-- 目前高度 -->
            <div class="flex items-center justify-between w-full mb-3">
              <span class="text-sm text-slate-500">目前高度：</span>
              <div class="flex items-baseline gap-1">
                <span id="settings-height-display" class="digital-font text-2xl font-semibold text-brand-400 tabular-nums">--.-</span>
                <span class="text-xs text-slate-500 font-semibold ml-0.5">cm</span>
              </div>
            </div>

            <!-- 目前偵測 -->
            <div class="flex items-center justify-between w-full mb-3">
              <span class="text-sm text-slate-500">目前偵測模式：</span>
              <span id="settings-status-badge" class="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold bg-brand-950 text-brand-400 border border-brand-900/60">坐姿</span>
            </div>

            <!-- 分隔線 -->
            <div class="h-px bg-white/10 my-2"></div>

            <!-- Threshold 滑桿控制 -->
            <div class="mt-auto">
              <div class="flex items-center justify-between w-full">
                <span class="text-sm text-slate-500">坐站基準高度：</span>
                <div class="flex items-baseline gap-1">
                  <span id="threshold-val-display" class="digital-font text-3xl font-semibold text-brand-500 tabular-nums">--.-</span>
                  <span class="text-xs text-slate-400 font-semibold ml-0.5">cm</span>
                </div>
              </div>
              <div class="py-2">
                <input
                  type="range"
                  id="threshold-slider"
                  min="60.0"
                  max="130.0"
                  step="0.5"
                  value="90.0"
                  class="range-fill range-brand w-full appearance-none cursor-pointer bg-transparent"
                >
              </div>
            </div>
          </div>
        </div>

        <!-- Connection 模組 -->
        <div class="panel-card relative">
          <div class="inner-core p-5 flex flex-col justify-between relative h-full">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="wifi" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
              <span class="text-sm font-semibold tracking-wide text-slate-400">連線配置</span>
            </div>

            <div class="space-y-3 flex-1 flex flex-col justify-center">
              <!-- Desk Address -->
              <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">Desk address（ESPHome 裝置 IP）</label>
                <input
                  type="text"
                  id="input-desk-address"
                  class="w-full px-3 py-2.5 text-sm outline-none font-semibold transition-colors"
                  placeholder="192.168.1.120"
                >
              </div>

              <!-- Username & Password Row -->
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1">Username（選填）</label>
                  <input
                    type="text"
                    id="input-username"
                    class="w-full px-3 py-2.5 text-sm outline-none font-semibold transition-colors"
                    placeholder="使用者帳戶"
                  >
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-500 mb-1">Password（選填）</label>
                  <input
                    type="password"
                    id="input-password"
                    class="w-full px-3 py-2.5 text-sm outline-none font-semibold transition-colors"
                    placeholder="使用者密碼"
                  >
                </div>
              </div>
            </div>

            <!-- Save & Reconnect -->
            <button id="btn-save-settings" class="w-full mt-3 py-3 text-white font-semibold text-sm flex items-center justify-center gap-2">
              <i data-lucide="refresh-cw" class="w-4 h-4" stroke-width="1.75"></i>
              Save & Reconnect
            </button>
          </div>
        </div>

      </div>

      <div class="grid grid-cols-2 gap-4">

        <!-- Save Current Height to Memory -->
        <div class="panel-card relative">
          <div class="inner-core p-4 flex flex-col justify-between relative h-full">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="save" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
              <span class="text-sm font-semibold tracking-wide text-slate-400">儲存當前高度至記憶體</span>
            </div>
            <span class="text-sm text-slate-500 mb-3">將目前實際高度複寫覆蓋進對應預設鍵中</span>
            <div class="grid grid-cols-3 gap-3">
              <button data-button="Save Height in Memory 1" class="ghost-save-btn py-3.5 text-slate-200 font-semibold text-xs">
                Save to M1
              </button>
              <button data-button="Save Height in Memory 2" class="ghost-save-btn py-3.5 text-slate-200 font-semibold text-xs">
                Save to M2
              </button>
              <button data-button="Save Height in Memory 3" class="ghost-save-btn py-3.5 text-slate-200 font-semibold text-xs">
                Save to M3
              </button>
            </div>
          </div>
        </div>

        <!-- Misc 模組 -->
        <div class="panel-card relative">
          <div class="inner-core p-4 flex flex-col justify-between relative h-full">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="cpu" class="w-5 h-5 text-brand-500" stroke-width="1.75"></i>
              <span class="text-sm font-semibold tracking-wide text-slate-400">硬體通訊測試</span>
            </div>
            <button id="btn-request" class="w-full py-3 text-slate-300 hover:text-white text-sm font-semibold flex items-center justify-center gap-2">
              <i data-lucide="power" class="w-4 h-4 text-brand-400" stroke-width="1.75"></i>
              Request Height (喚醒桌子並同步高度)
            </button>
          </div>
        </div>

      </div>

    </main>
  </div>

  <!-- 自定義訊息提示 Toast 容器 -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="app.js?v=20260711-status-icon-slot"></script>
</body>
</html>
