<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>SmartDesk - 智慧升降桌儀表板</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SmartDesk">
  <link rel="icon" href="icons/favicon-32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts & Lucide Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#eef2ff',
              100: '#e0e7ff',
              500: '#6366f1',
              600: '#4f46e5',
              900: '#312e81'
            },
            slate: {
              850: '#172033'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-950 text-slate-100 h-screen w-screen p-4 select-none flex flex-col justify-between">

  <!-- 橫向模式提示 (僅在直向時顯示) -->
  <div class="portrait-warning fixed inset-0 bg-slate-950 z-50 flex-col items-center justify-center p-6 text-center hidden">
    <div class="w-16 h-16 bg-slate-900 text-brand-500 rounded-full flex items-center justify-center mb-4 border border-slate-800">
      <i data-lucide="rotate-cw" class="w-8 h-8"></i>
    </div>
    <h3 class="text-xl font-bold mb-2">請橫置手機</h3>
    <p class="text-slate-400 text-sm font-medium">此控制面板專為手機橫向觸控操作設計</p>
  </div>

  <!-- ==================== VIEW 1: CONTROL (主控制視圖) ==================== -->
  <div id="control-view" class="w-full h-full flex flex-col justify-between">
    <!-- 主控台網格佈局 (橫向 2 欄) -->
    <main class="grid grid-cols-2 gap-4 flex-1 w-full h-full overflow-hidden">

      <!-- 左欄: 高度、手動移動與預設記憶 -->
      <section class="flex flex-col gap-3 h-full justify-between">

        <!-- 高度狀態卡片 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between flex-1 relative">
          <div class="flex justify-between items-start">
            <div class="text-slate-500 text-xs font-bold tracking-wide">當前高度</div>

            <!-- 坐/站 狀態徽章 -->
            <div id="status-badge" class="inline-flex items-center gap-1 px-2.5 py-0.5 rounded-full text-[10px] font-extrabold bg-indigo-950 text-indigo-400 border border-indigo-900">
              <i data-lucide="accessibility" class="w-3 h-3"></i>
              <span id="status-text">坐姿模式</span>
            </div>
          </div>

          <!-- 數字顯示 -->
          <div class="my-1 flex items-baseline justify-between">
            <div class="flex items-baseline">
              <span id="height-display" class="digital-font text-5xl font-extrabold tracking-tight text-brand-500">--.-</span>
              <span id="unit-display" class="text-slate-400 text-sm ml-1.5 font-bold">cm</span>
            </div>
            <div class="text-right text-[10px] text-slate-500 font-bold" id="moving-speed-indicator">
              靜止
            </div>
          </div>
        </div>

        <!-- 手動快速調整 Move -->
        <div class="grid grid-cols-2 gap-3">
          <!-- 下降按鈕 -->
          <button
            id="btn-lower"
            class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-slate-900 border border-slate-800 text-slate-300 font-bold text-sm select-none touch-none active:bg-rose-950 active:border-rose-900 active:text-rose-200 active:scale-95 transition-all duration-100"
            oncontextmenu="return false;"
          >
            <i data-lucide="chevron-down" class="w-5 h-5"></i>
            <span>下降</span>
          </button>

          <!-- 升起按鈕 -->
          <button
            id="btn-raise"
            class="flex items-center justify-center gap-2 py-3.5 rounded-xl bg-slate-900 border border-slate-800 text-slate-300 font-bold text-sm select-none touch-none active:bg-emerald-950 active:border-emerald-900 active:text-emerald-200 active:scale-95 transition-all duration-100"
            oncontextmenu="return false;"
          >
            <i data-lucide="chevron-up" class="w-5 h-5"></i>
            <span>升起</span>
          </button>
        </div>

        <!-- 記憶預設 (Memory Presets) -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-3 flex flex-col justify-between">
          <span class="text-slate-500 text-xs font-bold block mb-2 tracking-wide">預設高度</span>
          <div class="grid grid-cols-3 gap-2">
            <button data-button="M1" class="preset-recall flex items-center justify-center py-3.5 rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-xs text-slate-200 font-extrabold">M1</span>
            </button>
            <button data-button="M2" class="preset-recall flex items-center justify-center py-3.5 rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-xs text-slate-200 font-extrabold">M2</span>
            </button>
            <button data-button="M3" class="preset-recall flex items-center justify-center py-3.5 rounded-xl bg-slate-850 border border-slate-800 hover:bg-brand-600 hover:border-brand-500 active:scale-95 transition-all duration-100">
              <span class="text-xs text-slate-200 font-extrabold">M3</span>
            </button>
          </div>
        </div>

      </section>

      <!-- 右欄: 坐站排程計畫 (Sit/Stand Schedule) -->
      <section class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between h-full relative">

        <div class="flex flex-col h-full justify-between">
          <div>
            <div class="flex items-center justify-between mb-4">
              <div class="flex items-center gap-1.5">
                <i data-lucide="calendar-range" class="w-4 h-4 text-brand-500"></i>
                <span class="text-xs font-bold tracking-wide">坐站排程</span>
              </div>

              <div class="flex items-center gap-2">
                <!-- Switch 觸控開關 -->
                <label class="inline-flex items-center cursor-pointer p-1">
                  <input type="checkbox" id="schedule-toggle" class="sr-only peer">
                  <div class="relative w-12 h-7 bg-slate-850 border border-slate-700 rounded-full transition-colors peer-checked:bg-brand-500 peer-checked:border-brand-500 after:content-[''] after:absolute after:top-[3px] after:left-[3px] after:h-5 after:w-5 after:bg-slate-400 after:rounded-full after:transition-all peer-checked:after:translate-x-5 peer-checked:after:bg-white"></div>
                </label>

                <!-- 連線狀態小圓點 (點擊嘗試重新連線) -->
                <button id="dot-connect-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-850 border border-slate-800" title="連線狀態 (點擊重新連線)">
                  <span id="status-dot" class="block w-3 h-3 rounded-full bg-rose-500"></span>
                </button>

                <!-- ⚙ 按鈕 (切換到 Settings 視圖)，放在螢幕右側方便單手觸控 -->
                <button onclick="switchView('settings')" class="w-10 h-10 flex items-center justify-center bg-slate-850 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl transition-colors border border-slate-800" title="前往設定">
                  <i data-lucide="settings" class="w-5 h-5"></i>
                </button>
              </div>
            </div>

            <!-- 觸控滑軌 (Sliders) -->
            <div class="space-y-5">
              <!-- Sitting Time Slider -->
              <div class="space-y-1">
                <div class="flex justify-between text-xs text-slate-400 font-semibold">
                  <span>坐姿時間</span>
                  <span class="font-extrabold text-brand-400" id="sit-time-display">-- 分</span>
                </div>
                <div class="py-1">
                  <input
                    type="range"
                    id="sit-time-slider"
                    min="1"
                    max="120"
                    value="45"
                    class="w-full appearance-none cursor-pointer accent-brand-500 bg-transparent"
                  >
                </div>
              </div>

              <!-- Standing Time Slider -->
              <div class="space-y-1">
                <div class="flex justify-between text-xs text-slate-400 font-semibold">
                  <span>站姿時間</span>
                  <span class="font-extrabold text-emerald-400" id="stand-time-display">-- 分</span>
                </div>
                <div class="py-1">
                  <input
                    type="range"
                    id="stand-time-slider"
                    min="1"
                    max="60"
                    value="15"
                    class="w-full appearance-none cursor-pointer accent-emerald-500 bg-transparent"
                  >
                </div>
              </div>
            </div>
          </div>

          <div class="text-[10px] text-slate-600 text-center font-semibold tracking-wider pt-4 border-t border-slate-950">
            HEALTHY WORKING WORKFLOW
          </div>
        </div>

      </section>
    </main>
  </div>


  <!-- ==================== VIEW 2: SETTINGS (設定視圖) ==================== -->
  <div id="settings-view" class="hidden w-full h-full flex flex-col justify-between">
    <main class="grid grid-cols-2 gap-4 flex-1 w-full h-full overflow-hidden">

      <!-- 設定左欄: Height Threshold 與 儲存記憶鍵 -->
      <section class="flex flex-col gap-3 h-full justify-between">

        <!-- Height Threshold 卡片 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between flex-1 relative">
          <div>
            <div class="text-slate-400 text-xs font-bold tracking-wide">高度臨界值設定</div>
            <span class="text-[9px] text-slate-500">判定坐姿或站姿的基準高度</span>
          </div>

          <!-- Threshold 滑桿控制 -->
          <div class="my-auto py-2">
            <div class="flex justify-between items-baseline mb-2">
              <span class="text-xs font-bold text-slate-400">Sit / Stand Height Threshold</span>
              <div>
                <span id="threshold-val-display" class="digital-font text-2xl font-extrabold text-brand-500">--.-</span>
                <span class="text-xs text-slate-400 font-bold ml-0.5">cm</span>
              </div>
            </div>
            <div class="py-2">
              <input
                type="range"
                id="threshold-slider"
                min="60.0"
                max="130.0"
                step="0.5"
                value="90.0"
                class="w-full appearance-none cursor-pointer accent-brand-500 bg-transparent"
              >
            </div>
          </div>
        </div>

        <!-- Save Current Height to Memory -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
          <div class="mb-3">
            <span class="text-slate-400 text-xs font-bold block tracking-wide">儲存當前高度至記憶體</span>
            <span class="text-[9px] text-slate-500">將目前實際高度複寫覆蓋進對應預設鍵中</span>
          </div>
          <div class="grid grid-cols-3 gap-2">
            <button data-button="Save Height in Memory 1" class="ghost-save-btn py-3 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M1
            </button>
            <button data-button="Save Height in Memory 2" class="ghost-save-btn py-3 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M2
            </button>
            <button data-button="Save Height in Memory 3" class="ghost-save-btn py-3 rounded-xl bg-slate-850 border border-slate-800 text-slate-200 font-bold text-xs hover:bg-indigo-950 active:scale-95 transition-all">
              Save to M3
            </button>
          </div>
        </div>

      </section>

      <!-- 設定右欄: Connection 與 Misc -->
      <section class="flex flex-col gap-3 h-full justify-between">

        <!-- Connection 模組 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between flex-1">
          <div class="flex justify-between items-center mb-3">
            <span class="text-slate-400 text-xs font-bold tracking-wide">連線配置</span>

            <div class="flex items-center gap-2">
              <!-- 連線狀態小圓點 (點擊嘗試重新連線)，樣式與主控視圖一致 -->
              <button id="settings-dot-connect-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-850 border border-slate-800" title="連線狀態 (點擊重新連線)">
                <span id="settings-status-dot" class="block w-3 h-3 rounded-full bg-rose-500"></span>
              </button>
              <!-- ← 按鈕 (切回 Control)，放在螢幕右側方便單手觸控 -->
              <button onclick="switchView('control')" class="w-10 h-10 flex items-center justify-center bg-slate-850 hover:bg-slate-800 text-slate-300 hover:text-white rounded-xl border border-slate-800 transition-colors" title="返回主控">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
              </button>
            </div>
          </div>

          <div class="space-y-3 flex-1 flex flex-col justify-center">
            <!-- Desk Address -->
            <div>
              <label class="block text-[10px] font-bold text-slate-500 mb-1">Desk address (ESPHome 裝置 IP)</label>
              <input
                type="text"
                id="input-desk-address"
                class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2 text-xs text-slate-200 focus:border-brand-500 outline-none font-bold"
                placeholder="192.168.1.120"
              >
            </div>

            <!-- Username & Password Row -->
            <div class="grid grid-cols-2 gap-2">
              <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">Username (選填)</label>
                <input
                  type="text"
                  id="input-username"
                  class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2 text-xs text-slate-200 focus:border-brand-500 outline-none font-bold"
                  placeholder="使用者帳戶"
                >
              </div>
              <div>
                <label class="block text-[10px] font-bold text-slate-500 mb-1">Password (選填)</label>
                <input
                  type="password"
                  id="input-password"
                  class="w-full bg-slate-950 border border-slate-850 rounded-xl px-3 py-2 text-xs text-slate-200 focus:border-brand-500 outline-none font-bold"
                  placeholder="裝置安全密碼"
                >
              </div>
            </div>
          </div>

          <!-- Save & Reconnect -->
          <button id="btn-save-settings" class="w-full mt-3 py-3.5 bg-brand-600 hover:bg-brand-500 text-white font-extrabold text-xs rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i data-lucide="refresh-cw" class="w-4 h-4"></i>
            Save & Reconnect
          </button>
        </div>

        <!-- Misc 模組 -->
        <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between">
          <span class="text-slate-400 text-xs font-bold block tracking-wide mb-2">硬體通訊測試</span>
          <button id="btn-request" class="w-full py-3 bg-slate-850 border border-slate-800 text-slate-300 hover:text-white hover:bg-slate-800 text-xs font-bold rounded-xl active:scale-95 transition-all flex items-center justify-center gap-2">
            <i data-lucide="power" class="w-4 h-4 text-brand-400"></i>
            Request Height (喚醒桌子並同步高度)
          </button>
        </div>

      </section>

    </main>
  </div>

  <!-- 自定義訊息提示 Toast 容器 -->
  <div id="toast-container" class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <script src="app.js"></script>
</body>
</html>
